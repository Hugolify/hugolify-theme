module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static

  # Librairies
  imports:

    # Import Lightbox (Tobii)
    - path: github.com/midzer/tobii
      ignoreConfig: true
      mounts:
        - source: dist/tobii.min.css
          target: static/assets/css/tobii.min.css
        - source: dist/tobii.min.js
          target: static/assets/js/tobii.min.js

    # Import GDPR complian (Cookie consent)
    - path: github.com/orestbida/cookieconsent
      ignoreConfig: true
      mounts:
        - source: dist/cookieconsent.css
          target: static/assets/css/cookieconsent.css
        - source: dist/cookieconsent.umd.js
          target: static/assets/js/cookieconsent.umd.js

    # Import Carousel (Splide)
    - path: github.com/Splidejs/splide
      ignoreConfig: true
      mounts:
        - source: dist/css/splide.min.css
          target: static/assets/css/splide.min.css
        - source: dist/js/splide.min.js
          target: static/assets/js/splide.min.js

    # Import Parallax (Rellax)
    - path: github.com/dixonandmoe/rellax
      ignoreConfig: true
      mounts:
        - source: rellax.min.js
          target: assets/js/vendors/rellax.min.js # import in javascript core pipe (only if parallax enabled in params)

# Params
params:

  # Website
  cookie_banner:
    enable: false # Enable Cookie banner
    cookieconsent:
      enable: false # Use CookieConsent
      analytics: false
      functionality: false
      marketing: false
      disablePageInteraction: false
  css:
    darkmode: false # default: false (only light mode)
    preload: false
    print: false
  header:
    layout: drawer # modal also available
    drawer:
      position: end
    modal:
      centered: true
      size: fullscreen
  form:
    ajax: false # Set true to enable ajax form
    netlify: true # Set false to disable Netlify Forms
    action: false # Replace by action URL from https://fabform.io/, https://formspree.io/, https://kwesforms.com/ …
  logo:
    header: '/assets/images/logo.svg'
    footer: '/assets/images/logo.svg'
  search:
    enable: false # if true add search page to /content/search/_index.md or add a search block
    layout: raw # drawer and modal also available
    filter: false
    sort: false

  # Front
  column: 12
  gutter: 24
  container:
    desktop: 1296
    mobile: 300

  # Images
  hero:
    cover: '1600x400'
    cover_mobile: '360x400'
    desktop: '416x'
    mobile: '300x'
  image:
    xlarge: '1600x'
    xsmall: '50x50'
    desktop: '856x'
    mobile: '300x'
    mobile_full: '360x'
    scrollsnap: '240x'
    # Responsive mode (srcset width descriptors + sizes). Retina is handled by the browser via DPR,
    # so we never emit explicit 2x/3x files: the ladder just needs to reach ~2x the largest render width.
    # Dense ladder for on-the-fly CDNs (Cloudinary/Uploadcare) — variants are free, no build cost.
    srcset_widths: [320, 480, 640, 768, 960, 1280, 1440, 1600, 1920, 2560]
    # Lean ladder for Hugo — every width is a file generated at build time, so keep it short.
    # Variants larger than the source are skipped automatically (no upscaling).
    srcset_widths_hugo: [400, 800, 1200, 1600]
    sizes_default: '100vw'
    # Below this requested width, lazy images stay in the fixed-size + 2x retina mode (avatars, icons,
    # small thumbnails) instead of generating a responsive srcset ladder.
    responsive_min_width: 320
    # Max-width breakpoints (px) between tiers for a shorthand `sizes` CSV. "100vw, 50vw, 25vw" →
    # mobile (≤576) 100vw, tablet (≤1024) 50vw, desktop 25vw.
    sizes_breakpoints: [576, 1024]
  thumbnail:
    desktop: '414x177'
    mobile: '300x129'
    scrollsnap: '240x103'
    sizes: 100vw, 50vw, 25vw
  navigation:
    desktop: '414x200'
    mobile: '300x150'
  pages:
    thumbnail:
      desktop: '416x179'
      desktop_large: '636x273'
      mobile: '300x129'
      scrollsnap: '240x103'
    image:
      desktop: '856x'
      mobile: '360x'
  blocks:
    editorial:
      desktop: '636x'
      mobile: '360x'
    gallery:
      mobile: '138x138'
    informations:
      image:
        ratio: .5196

# Privacy
privacy:
  instagram:
    simple: false
  vimeo:
    enableDNT: true
    simple: false
  x:
    enableDNT: true
    simple: false
  youtube:
    privacyEnhanced: true

# Services
services:
  instagram:
    disableInlineCSS: false
  x:
    disableInlineCSS: false
