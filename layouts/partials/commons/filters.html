{{- $context := .context }}
{{- with .section }}
  <div class="filters drawer" tabindex="-1" id="filters" aria-labelledby="filtersLabel" {{- if site.Params.search.enable }} data-pagefind-ignore{{ end }}>
    {{ partialCached "commons/filters/header" $context }}
    {{ partialCached (print . "/filters/content") $context }}
  </div>
{{- end }}
